<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdzHub - Plataforma de Gestão de Marketing Digital e Automação</title>
    <meta name="description" content="A plataforma completa para gestão criativa, automação de marketing e análise de dados. Substitua mais de 20 ferramentas com uma solução convergente." />
    <meta name="keywords" content="gestão de marketing, automação marketing, geração de conteúdo, analytics, gestão criativa, marketing digital" />
    <meta name="author" content="AdzHub" />
    
    <!-- DNS Prefetch and Preconnect for faster resource loading -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://randomuser.me">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    </noscript>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://adzhub.com/" />
    <meta property="og:title" content="AdzHub - Plataforma de Gestão de Marketing Digital" />
    <meta property="og:description" content="A plataforma completa para gestão criativa, automação de marketing e análise de dados." />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://adzhub.com/" />
    <meta name="twitter:title" content="AdzHub - Plataforma de Gestão de Marketing Digital" />
    <meta name="twitter:description" content="A plataforma completa para gestão criativa, automação de marketing e análise de dados." />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Performance monitoring hint -->
    <script>
      // Reduce layout shifts
      if ('loading' in HTMLImageElement.prototype) {
        document.documentElement.classList.add('native-lazy-loading');
      }
    </script>
  </body>
</html>
